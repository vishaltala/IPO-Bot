name: IPO GMP Bot

on:
  workflow_dispatch:

jobs:
  gmp-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit ipo_log.csv back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright system dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64

      - name: Install Playwright Chromium browser
        run: playwright install chromium

      - name: Run GMP Bot
        env:
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER:    ${{ secrets.GMAIL_RECEIVER }}
          GMAIL_RECEIVER_HV: ${{ secrets.GMAIL_RECEIVER_HV }}
          FIRES:             ${{ secrets.FIRES }}
        run: python gmp_bot.py

      - name: Commit ipo_log.csv to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ipo_log.csv
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "chore: update ipo_log.csv [$(date -u '+%Y-%m-%d')]" && git push)
