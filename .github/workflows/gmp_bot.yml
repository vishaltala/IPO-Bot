name: IPO GMP Bot

on:
  schedule:
    # 7:00 AM Berlin time (CET = UTC+1, CEST = UTC+2)
    # Use UTC+1 (CET/winter): 06:00 UTC
    # Use UTC+2 (CEST/summer): 05:00 UTC
    # Since Indian IPO season runs all year and Germany is on CEST (UTC+2) now,
    # we run at 05:00 UTC which = 07:00 CEST (summer) and 06:00 CET (winter).
    # Adjust the cron below each season if needed, or just run both:
    - cron: "0 5 * * *"   # 07:00 CEST (summer, UTC+2) — Apr to Oct
    - cron: "0 6 * * *"   # 07:00 CET  (winter, UTC+1) — Oct to Mar

  # Also allow manual trigger from GitHub UI for testing
  workflow_dispatch:

jobs:
  gmp-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright system dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64

      - name: Install Playwright Chromium browser
        run: playwright install chromium

      - name: Run GMP Bot
        env:
          GMAIL_SENDER:   ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          GMAIL_RECEIVER_HV: ${{ secrets.GMAIL_RECEIVER_HV }}
          FIRES:             ${{ secrets.FIRES }}
        run: python gmp_bot.py
